<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }

        header {
            background: #0078d7;
            color: white;
            text-align: center;
            padding: 20px;
        }

        nav {
            background: #333;
        }

        nav ul {
            list-style: none;
            display: flex;
            justify-content: center;
        }

        nav ul li {
            padding: 15px;
        }

        nav ul li a {
            color: white;
            text-decoration: none;
        }

        main {
            display: flex;
            padding: 20px;
        }

        section {
            flex: 3;
            padding: 20px;
        }

        aside {
            flex: 1;
            background: #f4f4f4;
            padding: 20px;
        }

        footer {
            background: #222;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mi Sitio Web</h1>
        <p>Ejemplo de estructura HTML5</p>
    </header>

    <nav>
        <ul>
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Servicios</a></li>
            <li><a href="#">Productos</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Contenido Principal</h2>
            <p>
                Aquí va el contenido principal de la página.
            </p>
        </section>

        <aside>
            <h3>Barra Lateral</h3>
            <p>Información adicional, anuncios o enlaces.</p>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026 Mi Sitio Web. Todos los derechos reservados.</p>
    </footer>

</body>
</html>
